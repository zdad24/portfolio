<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1510"/>

  <!-- Scanline overlay (subtle) -->
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.06"/>
  <defs>
    <pattern id="scan" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="2" fill="#fff"/>
    </pattern>
    <!-- Grid dots -->
    <pattern id="grid" patternUnits="userSpaceOnUse" width="40" height="40">
      <rect x="0" y="0" width="2" height="2" fill="#cf3a2f" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Dot grid background -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top bar (menubar) -->
  <rect width="1200" height="44" fill="#2a211a"/>
  <rect y="44" width="1200" height="2" fill="#cf3a2f"/>
  <text x="20" y="28" font-family="monospace" font-size="16" fill="#f2c037" letter-spacing="2">zahadadOS</text>
  <text x="1140" y="28" font-family="monospace" font-size="14" fill="#8a7a6a">05/17</text>

  <!-- Window frame -->
  <rect x="80" y="90" width="1040" height="450" fill="#23190f" stroke="#cf3a2f" stroke-width="3"/>
  <!-- Window title bar -->
  <rect x="80" y="90" width="1040" height="36" fill="#2a211a"/>
  <rect x="80" y="126" width="1040" height="2" fill="#f2c037" opacity="0.5"/>
  <!-- Traffic lights -->
  <rect x="100" y="103" width="12" height="12" fill="#cf3a2f"/>
  <rect x="118" y="103" width="12" height="12" fill="#f2c037"/>
  <rect x="136" y="103" width="12" height="12" fill="#4a8" opacity="0.8"/>
  <text x="164" y="114" font-family="monospace" font-size="12" fill="#8a7a6a" letter-spacing="1">portfolio.jsx</text>

  <!-- Big ZJ pixel monogram — centered -->
  <!-- Z letterform (scaled 8x) -->
  <g fill="#cf3a2f">
    <rect x="390" y="180" width="80" height="16"/>
    <rect x="454" y="196" width="16" height="16"/>
    <rect x="438" y="212" width="16" height="16"/>
    <rect x="422" y="228" width="16" height="16"/>
    <rect x="406" y="244" width="16" height="16"/>
    <rect x="390" y="260" width="80" height="16"/>
  </g>
  <!-- J letterform (scaled 8x) -->
  <g fill="#f2c037">
    <rect x="510" y="180" width="64" height="16"/>
    <rect x="542" y="196" width="16" height="80"/>
    <rect x="510" y="276" width="32" height="16"/>
    <rect x="510" y="260" width="16" height="16"/>
  </g>

  <!-- Name -->
  <text x="600" y="360" font-family="monospace" font-size="42" fill="#f5f0e8" text-anchor="middle" letter-spacing="4" font-weight="bold">ZAHADAD JARIF</text>

  <!-- Tagline -->
  <text x="600" y="405" font-family="monospace" font-size="18" fill="#cf3a2f" text-anchor="middle" letter-spacing="3">SWE INTERN @ 4D  ·  CS @ YORK  ·  CO-FOUNDER ReRoute</text>

  <!-- Bottom accent bar -->
  <rect x="80" y="520" width="1040" height="2" fill="#cf3a2f" opacity="0.5"/>
  <text x="600" y="548" font-family="monospace" font-size="13" fill="#8a7a6a" text-anchor="middle" letter-spacing="2">zahadadjarif.tech</text>
</svg>
