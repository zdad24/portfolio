<!doctype html>
<html><head><style>
body{background:#f1ead8;display:flex;gap:24px;padding:40px;align-items:flex-start;}
.box{background:#e8dec5;border:2px solid #15161a;padding:12px;box-shadow:4px 4px 0 #15161a;}
img{display:block;image-rendering:pixelated;}
</style></head>
<body>
<div class="box">
  <p style="font-family:monospace;font-size:11px;margin:0 0 8px">96×112 (native)</p>
  <img src="zahadad-pixel.svg" width="96" height="112"/>
</div>
<div class="box">
  <p style="font-family:monospace;font-size:11px;margin:0 0 8px">192×224 (2x)</p>
  <img src="zahadad-pixel.svg" width="192" height="224"/>
</div>
<div class="box">
  <p style="font-family:monospace;font-size:11px;margin:0 0 8px">288×336 (3x)</p>
  <img src="zahadad-pixel.svg" width="288" height="336"/>
</div>
</body></html>
